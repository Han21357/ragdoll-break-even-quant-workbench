name: Deploy portfolio page

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "app/templates/index.html"
      - "app/static/**"
      - "scripts/build_static_showcase.py"
      - "docs/assets/**"
      - "output/pdf/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build static portfolio artifact
        run: |
          mkdir -p _site/assets _site/files
          cp site/index.html site/styles.css _site/
          python scripts/build_static_showcase.py app/templates/index.html _site/demo.html site/fixtures.json
          cp site/fixtures.json _site/fixtures.json
          cp -R app/static _site/static
          cp site/api-static.js _site/static/js/api-static.js
          cp site/showcase.css _site/static/css/showcase.css
          cp docs/assets/dashboard-overview.png docs/assets/holdings-import.png _site/assets/
          cp app/static/brand/ragdoll/mascot-cutout.png _site/assets/
          cp output/pdf/ragdoll-quant-workbench-introduction.pdf _site/files/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
